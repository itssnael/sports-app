<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Utilisateur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="figma-link">
        <a href="https://www.figma.com/design/8se657MG3vyvSW5bxnu8Br/Untitled?node-id=0-1&t=G8aayQ9SdR4wS7it-1" target="_blank">Voir la maquette FIGMA</a>
    </div>

    <div class="parent">
        <div class="container">

        <div id="padd">
            <div id="header-re">       
                <div class="avatar">
                    <img src="image/icons8-avatar-48 (1).png" alt="Avatar" />
                </div>
            </div>
    
            <!-- Onglets de navigation -->
            <div class="tabs">
                <button class="tab active">Suggestions</button>
                <button class="tab">Amis</button>
                <button class="tab">Demandes</button>
            </div>
            
            <!-- Barre de recherche -->
            <div class="search-bar">
                <img src="image/icons8-search-50 (1).png" alt="loupe">
                <input type="text" placeholder="Rechercher des utilisateurs">
            </div>
            
            <!-- Liste des utilisateurs -->
            <div class="users-section">
                <h2>Utilisateurs qui partagent vos <span class="highlight">objectifs</span></h2>
                <div class="user-list">
                    <div class="user">
                        <img src="image/icons8-avatar-48 (1).png" alt="Avatar" class="avatar1">
                        <div class="user-info">
                            <p>Gabriela Ndoye</p>
                            <span>@gab_ndy</span>
                        </div>
                    </div>
                    <div class="user">
                        <img src="image/icons8-avatar-48 (3).png" alt="Avatar" class="avatar1">
                        <div class="user-info">
                            <p>Paul Moreau</p>
                            <span>@momoaul</span>
                        </div>
                    </div>
                    <div class="user">
                        <img src="image/icons8-avatar-48.png" alt="Avatar" class="avatar1">
                        <div class="user-info">
                            <p>Morgane Bailly</p>
                            <span>@bibidanslaplace</span>
                        </div>
                    </div>
                    <div class="user">
                        <img src="image/icons8-avatar-48 (4).png" alt="Avatar" class="avatar1">
                        <div class="user-info">
                            <p>Jules Meunier</p>
                            <span>@julescesar</span>
                        </div>
                    </div>
                </div>
                <a href="#" class="see-more">Voir plus</a>
            </div>
            
             <!-- Section des coachs/spécialistes -->
             <div class="coaches-section">
                <h2>Rentrez en contact avec nos <span class="highlight">spécialistes</span></h2>
                <div class="coaches-container">
                    <a href="profil-amis.html">
                        <div id="coach1" class="coaches-list"></div>
                    </a>
                    
                    <div id="coach2" class="coaches-list">
                        
                    </div>
                </div>

                <div id="description">
                    <div style="width: 52%;">
                        <p class="nom">Marine</p>
                        <p class="speciality">Coach Sportif</p>
                    </div>
                    <div>
                        <p class="nom">Louis</p>
                        <p class="speciality">Diététicien</p>
                    </div>
                </div>
                
    
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item">
                <a href="index.html"> <img src="image/icons8-home-48.png" alt="Home"> </a>
            </div>
            <div class="nav-item">
                <img src="image/icons8-dumbbell-26.png" alt="Workout">
            </div>
            <div class="nav-item-home-active">
                <img src="image/icons8-group-48 (1).png" alt="Friends">
            </div>
            <div class="nav-item">
                <img src="image/icons8-send-48 (1).png" alt="Message">
            </div>
        </nav>

        </div>
    </div>
</body>
</html>
